spring:
  application:
    name: pullwise-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pullwise?ssl=false&serverTimezone=America/Sao_Paulo}
    username: ${DB_USER:pullwise}
    password: ${DB_PASSWORD:pullwise}

  jpa:
    hibernate:
      ddl-auto: update
    show_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  # External Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:5000}

  # Artemis/ActiveMQ
  activemq:
    broker-url: ${ARTEMIS_BROKER_URL:tcp://localhost:61616}
    user: ${ARTEMIS_BROKER_USERNAME:guest}
    password: ${ARTEMIS_BROKER_PASSWORD:guest}

logging:
  level:
    com.pullwise: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
